<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vivo Rateio — Controle de Contas Corporativas</title>
<style>
  /* ===== DESIGN SYSTEM ===== */
  :root {
    /* Paleta: Azul corporativo profundo + Magenta Vivo + Cinza técnico */
    --brand-primary: #1a1f6e;      /* Azul índigo profundo */
    --brand-secondary: #6e1a7e;    /* Roxo Vivo */
    --accent: #c900a1;             /* Magenta Vivo */
    --accent-light: #f5d6f0;
    
    --surface: #ffffff;
    --surface-2: #f7f8fc;
    --surface-3: #eef0f8;
    --border: #dde1f0;
    
    --text-primary: #111827;
    --text-secondary: #4b5563;
    --text-muted: #9ca3af;
    
    --success: #059669;
    --warning: #d97706;
    --danger: #dc2626;
    --info: #2563eb;
    
    --shadow-sm: 0 1px 3px rgba(26,31,110,0.08);
    --shadow-md: 0 4px 12px rgba(26,31,110,0.12);
    --shadow-lg: 0 8px 24px rgba(26,31,110,0.16);
    
    --radius: 8px;
    --radius-lg: 12px;
    
    /* Typography */
    --font-display: 'Inter', 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: var(--font-display);
    background: var(--surface-2);
    color: var(--text-primary);
    font-size: 14px;
    line-height: 1.5;
  }

  /* Layout */
  .app { display: flex; min-height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: 240px;
    background: var(--brand-primary);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    transition: transform 0.3s ease;
  }
  .sidebar-logo {
    padding: 20px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .sidebar-logo h1 {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .sidebar-logo span {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    display: block;
    margin-top: 2px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .sidebar-logo .vivo-badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 20px;
    margin-top: 4px;
    letter-spacing: 0.5px;
  }

  .sidebar-nav {
    padding: 12px 0;
    flex: 1;
    overflow-y: auto;
  }
  .nav-section {
    padding: 8px 16px 4px;
    font-size: 10px;
    font-weight: 600;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 8px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    border-radius: 0;
    transition: all 0.15s;
    font-size: 13.5px;
    font-weight: 500;
    border-left: 3px solid transparent;
    text-decoration: none;
  }
  .nav-item:hover {
    background: rgba(255,255,255,0.08);
    color: #fff;
  }
  .nav-item.active {
    background: rgba(201,0,161,0.2);
    color: #fff;
    border-left-color: var(--accent);
  }
  .nav-item svg { width: 16px; height: 16px; opacity: 0.8; }
  .nav-badge {
    margin-left: auto;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 10px;
    min-width: 18px;
    text-align: center;
  }

  .sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .user-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,0.7);
    font-size: 12px;
  }
  .user-avatar {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }
  .user-info small { color: rgba(255,255,255,0.4); font-size: 10px; }
  .logout-btn {
    margin-left: auto;
    background: none; border: none; cursor: pointer;
    color: rgba(255,255,255,0.4);
    padding: 4px;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .logout-btn:hover { color: #fff; }

  /* Main content */
  .main {
    flex: 1;
    margin-left: 240px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .topbar h2 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    flex: 1;
  }
  .topbar-actions { display: flex; align-items: center; gap: 8px; }

  .page { padding: 24px; max-width: 1400px; }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    box-shadow: var(--shadow-sm);
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
  }

  /* KPI Cards */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    box-shadow: var(--shadow-sm);
  }
  .kpi-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .kpi-value {
    font-size: 26px;
    font-weight: 700;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .kpi-value.currency::before { content: 'R$ '; font-size: 14px; font-weight: 500; }
  .kpi-sub {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 6px;
  }
  .kpi-trend {
    font-size: 11px;
    font-weight: 600;
    margin-top: 4px;
  }
  .kpi-trend.up { color: var(--danger); }
  .kpi-trend.down { color: var(--success); }
  .kpi-card-accent { border-left: 4px solid var(--accent); }
  .kpi-card-success { border-left: 4px solid var(--success); }
  .kpi-card-warning { border-left: 4px solid var(--warning); }
  .kpi-card-info { border-left: 4px solid var(--info); }

  /* Grid layouts */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }

  /* Table */
  .table-container {
    overflow-x: auto;
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th {
    background: var(--surface-2);
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text-primary);
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface-2); }
  .td-mono { font-family: var(--font-mono); font-size: 12px; }
  .td-num { text-align: right; font-variant-numeric: tabular-nums; }

  /* Badges */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-success { background: #d1fae5; color: #065f46; }
  .badge-danger  { background: #fee2e2; color: #991b1b; }
  .badge-warning { background: #fef3c7; color: #92400e; }
  .badge-info    { background: #dbeafe; color: #1e40af; }
  .badge-purple  { background: #ede9fe; color: #5b21b6; }
  .badge-gray    { background: #f3f4f6; color: #374151; }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    white-space: nowrap;
    text-decoration: none;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary {
    background: var(--brand-primary);
    color: #fff;
  }
  .btn-primary:hover:not(:disabled) { background: #141964; }
  .btn-accent {
    background: var(--accent);
    color: #fff;
  }
  .btn-accent:hover:not(:disabled) { background: #a8008a; }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-primary);
  }
  .btn-outline:hover:not(:disabled) { background: var(--surface-2); }
  .btn-success { background: var(--success); color: #fff; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-lg { padding: 11px 24px; font-size: 15px; }
  .btn svg { width: 14px; height: 14px; }

  /* Form elements */
  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .form-control {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text-primary);
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }
  .form-control:focus {
    border-color: var(--brand-primary);
    box-shadow: 0 0 0 3px rgba(26,31,110,0.1);
  }
  select.form-control { cursor: pointer; }

  /* Dropzone */
  .dropzone {
    border: 2px dashed var(--border);
    border-radius: var(--radius-lg);
    padding: 40px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface-2);
  }
  .dropzone:hover, .dropzone.active {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .dropzone-icon { font-size: 40px; margin-bottom: 12px; }
  .dropzone h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .dropzone p { font-size: 12px; color: var(--text-muted); }

  /* Progress */
  .progress-bar {
    height: 6px;
    background: var(--surface-3);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--brand-primary), var(--accent));
    border-radius: 3px;
    transition: width 0.3s;
  }

  /* Alert */
  .alert {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    margin-bottom: 16px;
  }
  .alert-danger  { background: #fee2e2; border: 1px solid #fecaca; color: #991b1b; }
  .alert-warning { background: #fef3c7; border: 1px solid #fde68a; color: #92400e; }
  .alert-success { background: #d1fae5; border: 1px solid #a7f3d0; color: #065f46; }
  .alert-info    { background: #dbeafe; border: 1px solid #bfdbfe; color: #1e40af; }

  /* Status indicator */
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
  }
  .status-dot.imported  { background: var(--info); }
  .status-dot.reviewing { background: var(--warning); }
  .status-dot.confirmed { background: #8b5cf6; }
  .status-dot.closed    { background: var(--success); }
  .status-dot.draft     { background: var(--text-muted); }

  /* Reconciliation table */
  .recon-row-vivo { background: #fff7ed; }
  .recon-row-goc  { background: #eff6ff; }
  .recon-row-both {}

  /* Tabs */
  .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
  .tab-btn {
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: color 0.15s;
  }
  .tab-btn.active {
    color: var(--brand-primary);
    border-bottom-color: var(--brand-primary);
  }
  .tab-btn:hover { color: var(--text-primary); }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }
  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 24px;
    max-width: 560px;
    width: 100%;
    box-shadow: var(--shadow-lg);
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-close {
    background: none; border: none;
    cursor: pointer; color: var(--text-muted);
    padding: 4px; border-radius: 4px;
    font-size: 18px; line-height: 1;
  }
  .modal-close:hover { color: var(--text-primary); }
  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
  }
  .empty-state svg { width: 48px; height: 48px; margin: 0 auto 16px; opacity: 0.3; }
  .empty-state h3 { font-size: 15px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; }

  /* Chart placeholder */
  .chart-container { height: 240px; }

  /* Login page */
  .login-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--brand-primary) 0%, var(--brand-secondary) 100%);
    padding: 24px;
  }
  .login-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 380px;
    box-shadow: var(--shadow-lg);
  }
  .login-logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .login-logo h1 { font-size: 22px; font-weight: 800; color: var(--brand-primary); }
  .login-logo p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  .login-logo .accent { color: var(--accent); }

  /* Tabs */
  .tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); margin-bottom: 0; }
  .tab-btn {
    padding: 8px 16px; background: none; border: none;
    border-bottom: 2px solid transparent; margin-bottom: -2px;
    cursor: pointer; font-size: 13px; font-weight: 500;
    color: var(--text-secondary); transition: all 0.15s;
    border-radius: 6px 6px 0 0;
  }
  .tab-btn:hover { color: var(--brand-primary); background: var(--surface-3); }
  .tab-btn.active { color: var(--brand-primary); border-bottom-color: var(--brand-primary); font-weight: 600; }

  /* Form grid */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-240px); }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .grid-2, .grid-3, .form-grid { grid-template-columns: 1fr; }
  }

  /* Utility */
  .flex { display: flex; align-items: center; }
  .flex-between { display: flex; align-items: center; justify-content: space-between; }
  .gap-8 { gap: 8px; }
  .gap-12 { gap: 12px; }
  .gap-16 { gap: 16px; }
  .mt-4 { margin-top: 4px; }
  .mt-8 { margin-top: 8px; }
  .mt-16 { margin-top: 16px; }
  .mt-24 { margin-top: 24px; }
  .mb-16 { margin-bottom: 16px; }
  .mb-24 { margin-bottom: 24px; }
  .text-right { text-align: right; }
  .text-center { text-align: center; }
  .text-muted { color: var(--text-muted); font-size: 12px; }
  .text-success { color: var(--success); }
  .text-danger { color: var(--danger); }
  .text-warning { color: var(--warning); }
  .font-mono { font-family: var(--font-mono); font-size: 12px; }
  .w-full { width: 100%; }
  .separator { height: 1px; background: var(--border); margin: 16px 0; }
  .loading-spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--brand-primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 1s linear infinite; }
  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }

  /* Number formatting */
  .currency-value {
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
  }

  /* Allocation bar */
  .alloc-bar-container { margin-top: 8px; }
  .alloc-bar {
    height: 8px;
    border-radius: 4px;
    background: var(--surface-3);
    overflow: hidden;
    margin-top: 4px;
  }
  .alloc-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--brand-primary), var(--accent));
    border-radius: 4px;
  }

  /* Timeline for audit */
  .timeline { position: relative; padding-left: 24px; }
  .timeline::before {
    content: '';
    position: absolute;
    left: 7px; top: 8px; bottom: 8px;
    width: 2px;
    background: var(--border);
  }
  .timeline-item { position: relative; margin-bottom: 16px; }
  .timeline-dot {
    position: absolute;
    left: -21px; top: 4px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--brand-primary);
    border: 2px solid var(--surface);
    box-shadow: 0 0 0 2px var(--brand-primary);
  }
  .timeline-time { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
  .timeline-content { font-size: 13px; }

  /* Toast-like notifications (inline) */
  .inline-toast {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script>
const { useState, useEffect, useCallback, useRef, createContext, useContext } = React;
const RechartsLib = (typeof Recharts !== 'undefined') ? Recharts : {};
const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell } = RechartsLib;

// ===== API CLIENT =====
// ===== CONFIGURAÇÃO DA API =====
// Detecta automaticamente o modo de operação:
//   - github.io           → modo demo (sem backend)
//   - qualquer outro host → produção (tenta /api, se falhar avisa)
const API_BASE = (() => {
  const configured = localStorage.getItem('api_base_url');
  if (configured) return configured;
  if (location.hostname.includes('github.io')) return '__DEMO__';
  return '/api'; // produção: nginx faz proxy de /api → localhost:3001
})();

const DEMO_MODE = API_BASE === '__DEMO__';

// Dados de demonstração
const DEMO_DATA = {
  user: { id: '1', name: 'Adriano Carpinetti', email: 'admin@empresa.com.br', role_name: 'admin' },
  dashboard: {
    kpis: { total_invoice: 48350.90, total_allocated: 47980.20, total_lines: 127, lines_with_cc: 124, lines_without_cc: 3 },

let authToken = localStorage.getItem('auth_token');

const api = {
  setToken(t) { authToken = t; localStorage.setItem('auth_token', t || ''); },
  getToken() { return authToken; },
  headers() {
    return { 'Content-Type': 'application/json', ...(authToken ? { Authorization: `Bearer ${authToken}` } : {}) };
  },
  async get(path) {
    if (DEMO_MODE) return demoRequest('GET', path, null);
    const r = await fetch(API_BASE + path, { headers: this.headers() });
    if (r.status === 401) { api.setToken(null); window.location.reload(); }
    if (!r.ok) throw new Error((await r.json()).error || 'Erro');
    return r.json();
  },
  async post(path, body) {
    if (DEMO_MODE) return demoRequest('POST', path, body);
    const r = await fetch(API_BASE + path, { method: 'POST', headers: this.headers(), body: JSON.stringify(body) });
    if (!r.ok) throw new Error((await r.json()).error || 'Erro');
    return r.json();
  },
  async put(path, body) {
    if (DEMO_MODE) return demoRequest('PUT', path, body);
    const r = await fetch(API_BASE + path, { method: 'PUT', headers: this.headers(), body: JSON.stringify(body) });
    if (!r.ok) throw new Error((await r.json()).error || 'Erro');
    return r.json();
  },
  async upload(path, formData) {
    if (DEMO_MODE) return demoRequest('POST', path, {});
    const headers = authToken ? { Authorization: `Bearer ${authToken}` } : {};
    const r = await fetch(API_BASE + path, { method: 'POST', headers, body: formData });
    if (!r.ok) throw new Error((await r.json()).error || 'Erro no upload');
    return r.json();
  },
};

const AuthCtx = createContext(null);
function AuthProvider({ children }) {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    if (authToken) {
      api.get('/auth/me').then(d => { setUser(d.user); setLoading(false); })
        .catch(() => { api.setToken(null); setLoading(false); });
    } else { setLoading(false); }
  }, []);
  const login = async (email, password) => {
    const d = await api.post('/auth/login', { email, password });
    api.setToken(d.token);
    setUser(d.user);
  };
  const logout = () => { api.setToken(null); setUser(null); };
  return React.createElement(AuthCtx.Provider, { value: { user, login, logout, loading } }, children);
}
const useAuth = () => useContext(AuthCtx);

// ===== UTILITIES =====
const fmt = {
  currency(v) {
    if (v == null || isNaN(v)) return 'R$ -';
    return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
  },
  number(v) { return new Intl.NumberFormat('pt-BR').format(v); },
  pct(v) { return v != null ? `${Number(v).toFixed(1)}%` : '-'; },
  month(s) {
    if (!s) return '-';
    const [y, m] = s.split('-');
    const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    return `${months[parseInt(m)-1]}/${y}`;
  },
  date(s) {
    if (!s) return '-';
    const d = new Date(s);
    return d.toLocaleDateString('pt-BR');
  },
  phone(s) {
    if (!s) return '-';
    const n = s.replace(/\D/g, '');
    if (n.length === 11) return `(${n.slice(0,2)}) ${n.slice(2,7)}-${n.slice(7)}`;
    if (n.length === 10) return `(${n.slice(0,2)}) ${n.slice(2,6)}-${n.slice(6)}`;
    return s;
  },
};

// IMPORT PAGE
function ImportPage() {
  const [tab, setTab] = useState('vivo');
  const [files, setFiles] = useState([]);
  const [refMonth, setRefMonth] = useState(
    new Date().toISOString().slice(0,7)
  );
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const { show, ToastEl } = useToast();
  const fileRef = useRef();

  const handleDrop = (e) => {
    e.preventDefault();
    const dropped = Array.from(e.dataTransfer.files);
    setFiles(prev => [...prev, ...dropped]);
  };

  // ── Parser de arquivo Vivo TXT (posicional) no browser ──────────────────
  const parseVivoTxt = (text, fileName) => {
    const lines = text.split(/\r?\n/);
    const lineMap = new Map();
    let accountNumber = null, totalAmount = 0;

    // Mês pelo nome do arquivo ex: _0626.ZIP → 06/2026
    const mMatch = fileName.match(/_?(\d{2})(\d{2})\.(ZIP|TXT)/i);
    const refMonthLabel = mMatch ? `${mMatch[1]}/${2000+parseInt(mMatch[2])}` : refMonth;

    for (const row of lines) {
      if (row.length < 110) continue;
      const account = row.substring(0, 14).trim();
      const subscr  = row.substring(14, 29).trim();
      const phone   = row.substring(29, 44).trim();
      const segment = row.substring(105, 120).trim();
      const valStr  = row.substring(165, 195).trim();

      if (!accountNumber && account && /^\d{5,}$/.test(account)) accountNumber = account;

      const parseVal = s => { if (!s) return null; const v = parseFloat(s.replace(/[^\d.\-]/g,'')); return isNaN(v) ? null : v; };
      const isPhone  = s => s && /^\d{10,13}$/.test(s.replace(/\D/g,'')) && s.replace(/\D/g,'').length >= 10;

      if (segment === '059A') { const v = parseVal(valStr); if (v) totalAmount = v; }
      if (segment === '215D' && isPhone(phone)) {
        const v = parseVal(valStr);
        if (v !== null) lineMap.set(phone, { number: phone, subscr, amount: v });
      }
      if (segment === '110D' && isPhone(phone) && !lineMap.has(phone)) {
        lineMap.set(phone, { number: phone, subscr, amount: 0 });
      }
    }

    const lineList = Array.from(lineMap.values());
    if (!totalAmount && lineList.length) totalAmount = lineList.reduce((s,l) => s+l.amount, 0);

    return { accountNumber, referenceMonth: refMonthLabel, totalAmount, lines: lineList, fileName };
  };

  // ── Parser CSV GOC ────────────────────────────────────────────────────────
  const parseGocCsv = (text) => {
    const rows = text.split(/\r?\n/).filter(Boolean);
    if (!rows.length) return { items: [], errors: ['Arquivo vazio'] };
    const headers = rows[0].split(';').map(h => h.trim().replace(/^"|"$/g,''));
    const idx = k => headers.findIndex(h => h === k);
    const iLinha = idx('LINHA'), iCC = idx('COD_CENTRO_CUSTO'), iNomeCC = idx('CENTRO_CUSTO'),
          iFuncionario = idx('FUNCIONARIO'), iConta = idx('NUMERO_CONTA'), iSit = idx('LINHA_ATIVA');

    const items = [], errors = [];
    for (let i = 1; i < rows.length; i++) {
      const cols = rows[i].split(';').map(c => c.trim().replace(/^"|"$/g,''));
      const linha = cols[iLinha]?.replace(/\D/g,'');
      if (!linha || linha.length < 10) { errors.push(`Linha ${i+1}: telefone inválido`); continue; }
      items.push({
        number: linha,
        costCenterCode: cols[iCC] || '',
        costCenterName: cols[iNomeCC] || '',
        employee: cols[iFuncionario] || '',
        account: cols[iConta] || '',
        active: cols[iSit] !== 'N',
      });
    }
    return { items, errors };
  };

  // ── Lê o arquivo como texto com latin-1 ──────────────────────────────────
  const readFileAsText = (file) => new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => res(e.target.result);
    reader.onerror = rej;
    reader.readAsText(file, 'latin1');
  });

  // ── Submit com parsing no browser ────────────────────────────────────────
  const handleSubmit = async () => {
    if (!files.length) { show('Selecione ao menos um arquivo', 'error'); return; }
    if (!refMonth) { show('Informe o mês de referência', 'error'); return; }

    setLoading(true); setResult(null);

    if (!DEMO_MODE) {
      // Modo backend: envia para API
      const results = [];
      for (const file of files) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('referenceMonth', refMonth);
        try {
          const r = await api.upload('/imports/' + tab, formData);
          results.push({ file: file.name, success: true, ...r });
        } catch(err) {
          results.push({ file: file.name, success: false, error: err.message });
        }
      }
      setResult(results);
      const ok = results.filter(r => r.success).length;
      show(ok + ' arquivo(s) importado(s)', ok < results.length ? 'warning' : 'success');
      setLoading(false);
      return;
    }

    // Modo demo: parseia no browser
    const results = [];
    for (const file of files) {
      try {
        if (tab === 'vivo') {
          const text = await readFileAsText(file);
          const parsed = parseVivoTxt(text, file.name);
          // Salva no DEMO_DATA para aparecer no dashboard/rateio
          const accId = String(Date.now() + Math.random());
          const existing = DEMO_DATA.accounts.findIndex(a =>
            a.account_number === parsed.accountNumber && a.reference_month?.includes(parsed.referenceMonth?.split('/')[0]));
          const acct = {
            id: accId, account_number: parsed.accountNumber || file.name,
            reference_month: refMonth + '-01', total_amount: parsed.totalAmount, status: 'imported',
            lines: parsed.lines,
          };
          if (existing >= 0) DEMO_DATA.accounts[existing] = acct;
          else DEMO_DATA.accounts.unshift(acct);

          // Atualiza KPIs demo
          DEMO_DATA.dashboard.kpis.total_invoice = DEMO_DATA.accounts.reduce((s,a) => s + (a.total_amount||0), 0);
          DEMO_DATA.dashboard.kpis.total_lines = DEMO_DATA.accounts.reduce((s,a) => s + (a.lines?.length||0), 0);
          DEMO_DATA.dashboard.recentAccounts = DEMO_DATA.accounts.slice(0,5);

          results.push({
            file: file.name, success: true,
            accountNumber: parsed.accountNumber,
            referenceMonth: parsed.referenceMonth,
            totalAmount: parsed.totalAmount,
            lineCount: parsed.lines.length,
            lines: parsed.lines,
            warnings: parsed.lines.length === 0 ? ['Nenhuma linha encontrada — verifique o formato do arquivo'] : [],
          });
        } else {
          // GOC
          const text = await readFileAsText(file);
          const parsed = parseGocCsv(text);
          // Salva mapeamento de linhas → CC no DEMO_DATA
          DEMO_DATA._gocMap = DEMO_DATA._gocMap || {};
          for (const item of parsed.items) {
            DEMO_DATA._gocMap[item.number] = item;
          }
          // Atualiza linhas sem CC
          const semCC = Object.values(DEMO_DATA._gocMap).filter(i => !i.costCenterCode).length;
          DEMO_DATA.dashboard.kpis.lines_without_cc = semCC;

          results.push({
            file: file.name, success: true,
            itemCount: parsed.items.length,
            errorCount: parsed.errors.length,
            warnings: parsed.errors.slice(0, 5),
          });
        }
      } catch(err) {
        results.push({ file: file.name, success: false, error: err.message });
      }
    }

    setResult(results);
    const ok = results.filter(r => r.success).length;
    const fail = results.length - ok;
    show(ok + ' arquivo(s) processado(s)' + (fail ? ', ' + fail + ' com erro' : ''),
         fail > 0 ? 'warning' : 'success');
    setLoading(false);
  };

  return React.createElement('div', { className: 'page' },
    ToastEl,
    React.createElement('div', { className: 'tabs' },
      ['vivo', 'goc'].map(t =>
        React.createElement('button', {
          key: t, className: `tab-btn ${tab === t ? 'active' : ''}`,
          onClick: () => { setTab(t); setFiles([]); setResult(null); }
        }, t === 'vivo' ? '📄 Arquivo Vivo' : '📋 Arquivo GOC')
      )
    ),

    React.createElement('div', { className: 'grid-2' },
      // Left: upload
      React.createElement('div', { className: 'card' },
        React.createElement('div', { className: 'card-header' },
          React.createElement('div', { className: 'card-title' },
            tab === 'vivo' ? 'Importar Conta Vivo (ZIP/TXT)' : 'Importar GOC (CSV)'
          )
        ),

        React.createElement('div', { className: 'form-group' },
          React.createElement('label', { className: 'form-label' }, 'Mês de Referência'),
          React.createElement('input', {
            type: 'month', className: 'form-control', value: refMonth,
            onChange: e => setRefMonth(e.target.value)
          })
        ),

        React.createElement('div', {
          className: `dropzone${loading ? ' disabled' : ''}`,
          onDrop: handleDrop,
          onDragOver: e => e.preventDefault(),
          onClick: () => !loading && fileRef.current.click(),
        },
          React.createElement('div', { className: 'dropzone-icon' }, tab === 'vivo' ? '🗜️' : '📊'),
          React.createElement('h3', null, 'Arraste os arquivos aqui'),
          React.createElement('p', null,
            tab === 'vivo'
              ? 'Aceita arquivos .ZIP ou .TXT da Vivo (múltiplos arquivos)'
              : 'Aceita arquivo .CSV exportado do GOC'
          ),
          React.createElement('input', {
            ref: fileRef, type: 'file', style: { display: 'none' },
            multiple: tab === 'vivo', accept: tab === 'vivo' ? '.zip,.txt,.ZIP,.TXT' : '.csv,.CSV',
            onChange: e => setFiles(Array.from(e.target.files))
          })
        ),

        files.length > 0 && React.createElement('div', { className: 'mt-16' },
          React.createElement('div', { className: 'card-title mb-16' }, `${files.length} arquivo(s) selecionado(s):`),
          files.map((f, i) =>
            React.createElement('div', { key: i, className: 'flex-between', style: { padding: '6px 0', borderBottom: '1px solid var(--border)' } },
              React.createElement('span', { className: 'flex gap-8' },
                React.createElement('span', null, '📄'),
                React.createElement('span', null, f.name)
              ),
              React.createElement('span', { className: 'text-muted' },
                `${(f.size / 1024).toFixed(0)} KB`,
              )
            )
          )
        ),

        React.createElement('div', { className: 'flex gap-8 mt-16' },
          React.createElement('button', {
            className: 'btn btn-accent',
            onClick: handleSubmit,
            disabled: loading || !files.length
          }, loading ? [React.createElement(Spinner, { key: 's' }), ' Importando...'] : '▲ Importar'),
          files.length > 0 && React.createElement('button', {
            className: 'btn btn-outline',
            onClick: () => { setFiles([]); setResult(null); }
          }, '✕ Limpar')
        )
      ),

      // Right: results
      React.createElement('div', { className: 'card' },
        React.createElement('div', { className: 'card-title mb-16' }, 'Resultado da Importação'),
        result
          ? result.map((r, i) =>
              React.createElement('div', { key: i, style: { marginBottom: 16 } },
                // Cabeçalho do arquivo
                React.createElement('div', {
                  className: `alert ${r.success ? 'alert-success' : 'alert-danger'}`,
                  style: { marginBottom: 8 }
                },
                  React.createElement('strong', null, r.file),
                  React.createElement('br'),
                  r.success
                    ? React.createElement('span', null,
                        '✓ Processado com sucesso — ',
                        r.lineCount !== undefined
                          ? `${r.lineCount} linha(s) · ${fmt.currency(r.totalAmount || 0)}`
                          : r.itemCount !== undefined
                          ? `${r.itemCount} registro(s) GOC`
                          : r.message || 'OK'
                      )
                    : `✗ ${r.error}`
                ),

                // Tabela de linhas (Vivo)
                r.success && r.lines?.length > 0 && React.createElement('div', { className: 'card', style: { padding: 0, overflow: 'hidden' } },
                  React.createElement('div', { style: { padding: '8px 12px', background: 'var(--surface-2)', borderBottom: '1px solid var(--border)', fontSize: 12, fontWeight: 600, color: 'var(--text-secondary)' } },
                    `${r.lines.length} linha(s) encontrada(s)`
                  ),
                  React.createElement('div', { style: { maxHeight: 260, overflowY: 'auto' } },
                    React.createElement('table', { className: 'table', style: { margin: 0 } },
                      React.createElement('thead', null,
                        React.createElement('tr', null,
                          ['Telefone', 'Valor'].map(h => React.createElement('th', { key: h, style: { position: 'sticky', top: 0, background: 'var(--surface-1)', zIndex: 1 } }, h))
                        )
                      ),
                      React.createElement('tbody', null,
                        r.lines.map((l, j) =>
                          React.createElement('tr', { key: j },
                            React.createElement('td', null, React.createElement('code', null, fmt.phone(l.number))),
                            React.createElement('td', null, fmt.currency(l.amount))
                          )
                        )
                      )
                    )
                  )
                ),

                // Avisos
                r.warnings?.length > 0 && React.createElement('div', { style: { marginTop: 6, fontSize: 12, color: 'var(--warning)' } },
                  r.warnings.slice(0,3).map((w,j) => React.createElement('div', { key: j }, `⚠ ${typeof w === 'object' ? (w.message || (w.errors && w.errors.join(', ')) || JSON.stringify(w)) : w}`))
                )

          : React.createElement('div', { className: 'empty-state' },
              React.createElement('p', null, 'Os resultados aparecerão aqui após a importação.')

// ALLOCATIONS PAGE
function AllocationsPage() {
  const [accounts, setAccounts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [processing, setProcessing] = useState(null);
  const [modalId, setModalId] = useState(null);
  const [modalData, setModalData] = useState(null);
  const [closeModal, setCloseModal] = useState(null);
  const [filterYear, setFilterYear] = useState('');
  const [filterMonth, setFilterMonth] = useState('');
  const [filterStatus, setFilterStatus] = useState('');
  const [searchText, setSearchText] = useState('');
  const { show, ToastEl } = useToast();
  const currentYear = new Date().getFullYear();

  // Filtragem local das contas
  const filtered = accounts.filter(a => {
    const ref = a.reference_month?.substring(0, 7) || '';
    if (filterYear && !ref.startsWith(filterYear)) return false;
    if (filterMonth && !ref.endsWith('-' + filterMonth.padStart(2,'0'))) return false;
    if (filterStatus) {
      const st = a.allocation_status || a.status || '';
      if (filterStatus === 'pending'   && ['confirmed','closed'].includes(st)) return false;
      if (filterStatus === 'confirmed' && st !== 'confirmed') return false;
      if (filterStatus === 'closed'    && st !== 'closed') return false;
      if (filterStatus === 'sem_cc'    && !(parseInt(a.lines_without_cc) > 0)) return false;
      if (filterStatus === 'diferenca' && !(Math.abs(parseFloat(a.difference || 0)) > 0.01)) return false;
    }
    if (searchText && !a.account_number?.includes(searchText)) return false;
    return true;
  });

  // Anos e meses disponíveis
  const availableYears = [...new Set(accounts.map(a => a.reference_month?.substring(0,4)).filter(Boolean))].sort().reverse();
  const availableMonths = [...new Set(
    accounts
      .filter(a => !filterYear || a.reference_month?.startsWith(filterYear))
      .map(a => a.reference_month?.substring(5,7)).filter(Boolean)
  )].sort();

  useEffect(() => {
    loadData();
  }, []);

  const loadData = async () => {
    setLoading(true);
    try {
      const data = await api.get('/allocations').catch(() => ({ accounts: [], allocations: [] }));
      // Usa `accounts` (todas as contas Vivo importadas) como base da tela
      setAccounts(data.accounts || data.allocations || []);
    } finally { setLoading(false); }
  };

  const handleProcess = async (accountId, simulate = false) => {
    setProcessing(accountId);
    try {
      const r = await api.post('/allocations/process', { vivoAccountId: accountId, simulate });
      show(simulate ? 'Simulação concluída!' : 'Rateio processado com sucesso!');
      if (!simulate) loadData();
      return r;
    } catch(err) {
      show(err.message, 'error');
    } finally { setProcessing(null); }
  };

  const viewDetail = async (id) => {
    setModalId(id);
    try {
      const d = await api.get(`/allocations/${id}`);
      setModalData(d);
    } catch(err) { show(err.message, 'error'); setModalId(null); }
  };

  return React.createElement('div', { className: 'page' },
    ToastEl,
    React.createElement('div', { className: 'flex-between mb-16' },
      React.createElement('div', null,
        React.createElement('h2', { style: { fontSize: 18, fontWeight: 700 } }, 'Rateio Mensal'),
        React.createElement('p', { className: 'text-muted mt-4' }, 'Processamento e conferência por conta')
      ),
      React.createElement('button', { className: 'btn btn-outline', onClick: loadData }, '↺ Atualizar')
    ),

    // Filtros
    React.createElement('div', { className: 'card mb-12', style: { padding: '12px 16px' } },
      React.createElement('div', { style: { display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center' } },
        React.createElement('input', {
          type: 'search', className: 'input', placeholder: '🔍 Número da conta…',
          style: { width: 180 }, value: searchText,
          onChange: e => setSearchText(e.target.value)
        }),
        React.createElement('select', {
          className: 'input', style: { width: 90 }, value: filterYear,
          onChange: e => { setFilterYear(e.target.value); setFilterMonth(''); }
        },
          React.createElement('option', { value: '' }, 'Todos anos'),
          availableYears.map(y => React.createElement('option', { key: y, value: y }, y))
        ),

// ===== LINES PAGE =====
function LinesPage() {
  const [lines, setLines] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [searching, setSearching] = useState(false);
  const [total, setTotal] = useState(0);
  const [selected, setSelected] = useState(null);
  const [lineDetail, setLineDetail] = useState(null);
  const [loadingDetail, setLoadingDetail] = useState(false);
  const [filterCC, setFilterCC] = useState('');
  const [filterStatus, setFilterStatus] = useState('');
  const [filterAccount, setFilterAccount] = useState('');
  const [filterYear, setFilterYear] = useState('');
  const [filterMonth, setFilterMonth] = useState('');
  const [availableMonths, setAvailableMonths] = useState([]);

  const load = (q = '', yr = filterYear, mo = filterMonth) => {
    const params = new URLSearchParams();
    if (q) params.append('search', q);
    if (yr) params.append('year', yr);
    if (mo) params.append('month', mo);
    const url = '/lines' + (params.toString() ? '?' + params.toString() : '');
    return api.get(url).then(d => {
      setLines(d.lines || []);
      setTotal(d.total || 0);
      if (d.availableMonths) setAvailableMonths(d.availableMonths);
    }).catch(() => {}).finally(() => { setLoading(false); setSearching(false); });
  };

  useEffect(() => { load(); }, []);

  // Busca com debounce
  useEffect(() => {
    if (loading) return;
    setSearching(true);
    const t = setTimeout(() => load(search), 400);
    return () => clearTimeout(t);
  }, [search]);

  // Filtro local por CC e status
  const filtered = lines.filter(l => {
    if (filterCC && !(l.cost_center_code?.toLowerCase().includes(filterCC.toLowerCase()) ||
                      l.cost_center_name?.toLowerCase().includes(filterCC.toLowerCase()))) return false;
    if (filterAccount && !l.account_number?.includes(filterAccount)) return false;
    if (filterStatus === 'sem_cc' && l.cost_center_code) return false;
    if (filterStatus === 'com_cc' && !l.cost_center_code) return false;
    if (filterStatus === 'ativa' && !l.active) return false;
    if (filterStatus === 'inativa' && l.active) return false;
    return true;
  });

  const loadDetail = (number) => {
    setSelected(number);
    setLoadingDetail(true);
    api.get(`/lines/${number}/history`)
      .then(d => setLineDetail(d))
      .catch(() => setLineDetail(null))
      .finally(() => setLoadingDetail(false));
  };

  return React.createElement('div', { className: 'page' },
    React.createElement('div', { className: 'flex-between mb-16' },
      React.createElement('div', null,
        React.createElement('h2', { style: { fontSize: 18, fontWeight: 700 } }, 'Gestão de Linhas'),
        React.createElement('p', { className: 'text-muted mt-4' }, `${total} linha(s) telefônica(s) no sistema`)
      )
    ),

    React.createElement('div', { className: 'card mb-16', style: { padding: '12px 16px' } },
      React.createElement('div', { style: { display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center' } },
        React.createElement('input', {
          type: 'search', className: 'input',
          placeholder: '🔍 Número, funcionário…',
          value: search, onChange: e => setSearch(e.target.value),
          style: { width: 200 }
        }),
        React.createElement('input', {
          type: 'search', className: 'input',
          placeholder: '🏢 Centro de custo…',
          value: filterCC, onChange: e => setFilterCC(e.target.value),
          style: { width: 160 }
        }),
        React.createElement('input', {
          type: 'search', className: 'input',
          placeholder: '📄 Nº da conta…',
          value: filterAccount, onChange: e => setFilterAccount(e.target.value),
          style: { width: 140 }
        }),
        React.createElement('select', {
          className: 'input', style: { width: 90 },
          value: filterYear,
          onChange: e => { setFilterYear(e.target.value); setFilterMonth(''); load(search, e.target.value, ''); }
        },
          React.createElement('option', { value: '' }, 'Todos anos'),
          [2026, 2025, 2024, 2023].map(y =>
            React.createElement('option', { key: y, value: String(y) }, y)
          )
        ),
        React.createElement('select', {
          className: 'input', style: { width: 130 },
          value: filterMonth,
          onChange: e => { setFilterMonth(e.target.value); load(search, filterYear, e.target.value); }
        },
          React.createElement('option', { value: '' }, 'Todos os meses'),
          availableMonths
            .filter(m => !filterYear || m.startsWith(filterYear))
            .map(m => {
              const [y, mo] = m.split('-');
              const label = new Date(`${y}-${mo}-15`).toLocaleDateString('pt-BR', { month: 'short', year: 'numeric' });
              return React.createElement('option', { key: m, value: mo }, label);
            })
        ),
        React.createElement('select', {
          className: 'input', style: { width: 150 },
          value: filterStatus,
          onChange: e => setFilterStatus(e.target.value)
        },
          React.createElement('option', { value: '' }, 'Todos status'),
          React.createElement('option', { value: 'com_cc' }, 'Com CC'),

          React.createElement('option', { value: 'ativa' }, 'Ativas'),

        (filterCC || filterStatus || filterAccount || filterYear || filterMonth) && React.createElement('button', {

      )
    ),

    loading ? React.createElement(Spinner) :
    lines.length === 0 && filtered.length === 0
      ? React.createElement('div', { className: 'card empty-state' },
          React.createElement('h3', null, search ? 'Nenhuma linha encontrada para essa busca' : 'Nenhuma linha importada ainda'),
          React.createElement('p', null, search ? 'Tente outro termo' : 'Importe arquivos Vivo para as linhas aparecerem aqui')
        )
      : React.createElement('div', { style: { display: 'grid', gridTemplateColumns: selected ? '1fr 380px' : '1fr', gap: 16, alignItems: 'start' } },

          // Tabela principal
          React.createElement('div', { className: 'card', style: { padding: 0, overflow: 'hidden' } },
            searching && React.createElement('div', { style: { padding: '8px 16px', background: 'var(--surface-2)', fontSize: 12, color: 'var(--text-muted)' } }, 'Buscando…'),
            React.createElement('table', { className: 'table', style: { margin: 0 } },
              React.createElement('thead', null,
                React.createElement('tr', null,
                  ['Telefone', 'Funcionário', 'Centro de Custo', 'Conta', 'Último Valor', 'Mês Ref.', 'Status'].map(h =>
                    React.createElement('th', { key: h }, h)

                )
              ),
              React.createElement('tbody', null,
                filtered.map((l, i) =>
                  React.createElement('tr', {
                    key: l.number,
                    style: { cursor: 'pointer', background: selected === l.number ? 'var(--surface-3)' : '' },
                    onClick: () => loadDetail(l.number)
                  },
                    React.createElement('td', null, React.createElement('code', null, fmt.phone(l.number))),
                    React.createElement('td', null, l.employee_name || React.createElement('span', { className: 'text-muted' }, '—')),
                    React.createElement('td', null,
                      l.cost_center_code
                        ? React.createElement('div', null,
                            React.createElement('div', { style: { fontWeight: 500, fontSize: 13 } }, l.cost_center_name || l.cost_center_code),
                            React.createElement('small', { className: 'text-muted' }, l.cost_center_code)

                        : React.createElement('span', { className: 'badge badge-warning' }, 'Sem CC')
                    ),
                    React.createElement('td', null,
                      l.account_number

                        : React.createElement('span', { className: 'text-muted' }, '—')

  const [simResult, setSimResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [confirming, setConfirming] = useState(false);
  const [filterYear, setFilterYear] = useState(String(new Date().getFullYear()));
  const [filterMonth, setFilterMonth] = useState('');
  const { show: toast, ToastEl } = useToast();

  const currentYear = new Date().getFullYear();

  useEffect(() => {
    api.get('/allocations').then(d => {
      setAccounts(d.accounts || []);
    });
  }, []);

  // Filtra contas pendentes pelo ano/mês selecionado
  const filtered = accounts.filter(a => {
    const ref = a.reference_month?.substring(0, 7) || '';
    const yearOk = ref.startsWith(filterYear);
    const monthOk = !filterMonth || ref.endsWith('-' + filterMonth.padStart(2, '0'));
    const statusOk = !['closed'].includes(a.allocation_status || a.status);
    return yearOk && monthOk && statusOk;
  });

  // Meses disponíveis para o ano selecionado
  const availableMonths = [...new Set(
    accounts
      .filter(a => a.reference_month?.startsWith(filterYear))
      .map(a => a.reference_month?.substring(5, 7))
      .filter(Boolean)
  )].sort();

  const simulate = async () => {
    if (!selectedId) return toast('Selecione uma conta', 'error');
    setLoading(true);
    setSimResult(null);
    try {
      const d = await api.post('/allocations/process', { accountId: selectedId, simulate: true });
      setSimResult(d);
      toast('Simulação concluída', 'success');
    } catch (e) {
      toast(e.message || 'Erro na simulação', 'error');
    } finally { setLoading(false); }
  };

  const confirm = async () => {
    if (!window.confirm('Confirmar o rateio? Esta ação processará os valores definitivamente.')) return;
    setConfirming(true);
    try {
      await api.post('/allocations/process', { accountId: selectedId, simulate: false });
      toast('Rateio processado com sucesso!', 'success');
      setSimResult(null);
      setSelectedId('');
      api.get('/allocations').then(d => setAccounts(d.accounts || []));
    } catch (e) {
      toast(e.message || 'Erro ao confirmar', 'error');
    } finally { setConfirming(false); }
  };

  return React.createElement('div', { className: 'page' },
    ToastEl,
    React.createElement('div', { className: 'flex-between mb-24' },
      React.createElement('div', null,
        React.createElement('h2', { style: { fontSize: 18, fontWeight: 700 } }, 'Simulação de Rateio'),
        React.createElement('p', { className: 'text-muted mt-4' }, 'Prévia do rateio antes de confirmar os valores definitivos')
      )
    ),

    React.createElement('div', { className: 'card mb-24' },
      React.createElement('div', { style: { fontWeight: 600, marginBottom: 12 } }, 'Selecionar conta para simulação'),

      // Filtros de ano e mês
      React.createElement('div', { style: { display: 'flex', gap: 8, alignItems: 'center', marginBottom: 12, flexWrap: 'wrap' } },
        React.createElement('label', { style: { fontSize: 13, color: 'var(--text-secondary)' } }, 'Período:'),
        React.createElement('select', {
          className: 'input', style: { width: 100 },
          value: filterYear,
          onChange: e => { setFilterYear(e.target.value); setFilterMonth(''); setSelectedId(''); setSimResult(null); }
        },
          [currentYear, currentYear-1, currentYear-2].map(y =>
            React.createElement('option', { key: y, value: String(y) }, y)
          )
        ),
        React.createElement('select', {
          className: 'input', style: { width: 140 },
          value: filterMonth,
          onChange: e => { setFilterMonth(e.target.value); setSelectedId(''); setSimResult(null); }
        },
          React.createElement('option', { value: '' }, 'Todos os meses'),
          availableMonths.map(m => {
            const label = new Date(`${filterYear}-${m}-15`).toLocaleDateString('pt-BR', { month: 'long' });
            return React.createElement('option', { key: m, value: m },
              label.charAt(0).toUpperCase() + label.slice(1));
          })
        ),
        React.createElement('span', { style: { fontSize: 12, color: 'var(--text-muted)' } },
          `${filtered.length} conta(s) pendente(s)`
        )
      ),

      // Select de conta filtrado
      React.createElement('div', { style: { display: 'flex', gap: 12, alignItems: 'flex-end' } },
        React.createElement('div', { className: 'form-group', style: { marginBottom: 0, flex: 1 } },
          React.createElement('select', {
            className: 'input', value: selectedId,
            onChange: e => { setSelectedId(e.target.value); setSimResult(null); }
          },
            React.createElement('option', { value: '' }, '— Selecione uma conta —'),
            filtered.map(a =>
              React.createElement('option', { key: a.id, value: a.id },
                `Conta ${a.account_number} · ${fmt.month(a.reference_month)} · ${fmt.currency(a.total_amount)}`
              )
            )
          )
        ),
        React.createElement('button', { className: 'btn btn-primary', onClick: simulate, disabled: loading || !selectedId },
          loading ? '⏳ Simulando…' : '▶ Simular'
        )
      ),
      filtered.length === 0 && React.createElement('p', { className: 'text-muted mt-12', style: { fontSize: 12 } },
        accounts.length === 0
          ? 'Nenhuma conta importada. Importe arquivos Vivo primeiro.'
          : 'Nenhuma conta pendente para o período selecionado.'
      )
    ),

    loading && React.createElement('div', { className: 'card' }, React.createElement(Spinner)),

    simResult && React.createElement('div', null,
      // Aviso simulação
      React.createElement('div', { style: {
        background: '#fff7e6', border: '1px solid #f59e0b',
        borderRadius: 8, padding: '12px 16px', marginBottom: 16,
        display: 'flex', alignItems: 'center', gap: 8
      } },
        React.createElement('span', { style: { fontSize: 18 } }, '⚠'),
        React.createElement('div', null,
          React.createElement('strong', null, 'Resultado de simulação — não confirmado'),
          React.createElement('p', { style: { fontSize: 12, color: '#92400e', marginTop: 2 } },
            'Revise os valores abaixo. Clique em "Confirmar Rateio" apenas quando tudo estiver correto.')
        )
      ),

      // KPIs da simulação
      React.createElement('div', { className: 'kpi-grid mb-24' },
        React.createElement('div', { className: 'kpi-card' },
          React.createElement('div', { className: 'kpi-label' }, 'Total da Conta'),
          React.createElement('div', { className: 'kpi-value' }, fmt.currency(simResult.totalAmount || 0))
        ),
        React.createElement('div', { className: 'kpi-card' },
          React.createElement('div', { className: 'kpi-label' }, 'Total Rateado'),
          React.createElement('div', { className: 'kpi-value', style: { color: 'var(--success)' } },
            fmt.currency(simResult.totalAllocated || 0))
        ),
        React.createElement('div', { className: 'kpi-card' },
          React.createElement('div', { className: 'kpi-label' }, 'Diferença'),
          React.createElement('div', {
            className: 'kpi-value',
            style: { color: Math.abs(simResult.difference || 0) < 0.01 ? 'var(--success)' : 'var(--warning)' }
          }, fmt.currency(simResult.difference || 0))
        ),
        React.createElement('div', { className: 'kpi-card' },
          React.createElement('div', { className: 'kpi-label' }, 'Total de Linhas'),
          React.createElement('div', { className: 'kpi-value' },
            (simResult.totalLines || simResult.linesWithCC + simResult.linesWithoutCC || simResult.items?.reduce((s,i) => s + (i.lineCount||0), 0) || 0)
          ),
          React.createElement('div', { style: { fontSize: 11, color: 'var(--text-muted)', marginTop: 2 } },
            (() => {
              const comCC = simResult.linesWithCC || 0;
              const semCC = simResult.linesWithoutCC || 0;
              if (!comCC && !semCC) return null;
              return comCC + ' com CC' + (semCC ? ' · ' + semCC + ' sem CC' : '');
            })()
          )
        ),
        React.createElement('div', { className: 'kpi-card' },
          React.createElement('div', { className: 'kpi-label' }, 'Centros de Custo'),
          React.createElement('div', { className: 'kpi-value' }, simResult.items?.length || 0)
        )
      ),

      // Tabela do rateio simulado
      simResult.items?.length > 0 && React.createElement('div', { className: 'card mb-16' },
        React.createElement('div', { style: { fontWeight: 600, marginBottom: 12 } }, 'Rateio por Centro de Custo'),
        React.createElement('table', { className: 'table' },
          React.createElement('thead', null,
            React.createElement('tr', null,
              ['Centro de Custo', 'Linhas', 'Direto', 'Rateado', 'Total', '%'].map(h =>
                React.createElement('th', { key: h }, h)
              )
            )
          ),
          React.createElement('tbody', null,
            simResult.items.map((item, i) => {
              const ccN = item.costCenterName || item.cost_center_name || item.name || '—';
              const ccC = item.costCenterCode || item.cost_center_code || item.code || '—';
              const nL  = item.lineCount ?? item.direct_line_count ?? item.directLineCount ?? 0;
              const dir = parseFloat(item.directAmount  ?? item.direct_amount  ?? 0) || 0;
              const rat = parseFloat(item.allocatedAmount ?? item.allocated_amount ?? 0) || 0;
              const tot2 = parseFloat(item.totalAmount ?? item.total_amount ?? (dir + rat)) || 0;
              const totalAl = parseFloat(simResult.totalAllocated || simResult.totalAllocatedAmount || 0) || 1;
              const pct = tot2 > 0 ? ((tot2 / totalAl) * 100).toFixed(1) : '0.0';
              return React.createElement('tr', { key: i },
                React.createElement('td', null,
                  React.createElement('div', { style: { fontWeight: 500 } }, ccN),
                  React.createElement('small', { className: 'text-muted' }, ccC)
                ),
                React.createElement('td', null, nL),
                React.createElement('td', null, fmt.currency(dir)),
                React.createElement('td', null, fmt.currency(rat)),
                React.createElement('td', { style: { fontWeight: 700, color: 'var(--brand-primary)' } },
                  fmt.currency(tot2)
                ),
                React.createElement('td', null,
                  React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 6 } },
                    React.createElement('div', {
                      style: {
                        width: 60, height: 6, borderRadius: 3,
                        background: 'var(--surface-3)', overflow: 'hidden'
                      }
                    },
                      React.createElement('div', {
                        style: {
                          width: `${Math.min(100, parseFloat(pct) || 0)}%`,
                          height: '100%',
                          background: 'var(--brand-primary)',
                          borderRadius: 3,
                        }
                      })
                    ),
                    React.createElement('span', { style: { fontSize: 12 } }, `${pct}%`)
                  )
                )
              );
            })
          )
        )
      ),

      // Linhas sem CC
      simResult.unallocatedLines?.length > 0 && React.createElement('div', { className: 'card mb-16' },
        React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 } },
          React.createElement('span', { className: 'badge badge-warning' }, '⚠ Linhas sem Centro de Custo'),
          React.createElement('span', { className: 'text-muted', style: { fontSize: 12 } },
            `${simResult.unallocatedLines.length} linha(s) — serão rateadas pelas regras configuradas`)
        ),
        React.createElement('table', { className: 'table' },
          React.createElement('thead', null,
            React.createElement('tr', null,
              ['Telefone', 'Valor'].map(h => React.createElement('th', { key: h }, h))
            )
          ),
          React.createElement('tbody', null,
            simResult.unallocatedLines.map((l, i) =>
              React.createElement('tr', { key: i },
                React.createElement('td', null, React.createElement('code', null, fmt.phone(l.number || l.line_number))),
                React.createElement('td', null, fmt.currency(l.amount || 0))
              )
            )
          )
        )
      ),

      // Botão confirmar
      React.createElement('div', { style: { display: 'flex', justifyContent: 'flex-end', gap: 12, marginTop: 8 } },
        React.createElement('button', {
          className: 'btn btn-ghost',
          onClick: () => { setSimResult(null); setSelectedId(''); }
        }, 'Cancelar'),
        React.createElement('button', {
          className: 'btn btn-primary',
          onClick: confirm,
          disabled: confirming,
          style: { background: 'var(--success)' }
        }, confirming ? '⏳ Confirmando…' : '✓ Confirmar Rateio')
      )
    )
  );
}

// ===== NAVIGATION =====
const PAGES = {
  dashboard:      { label: 'Dashboard',          emoji: '📊', component: DashboardPage },
  import:         { label: 'Importação',          emoji: '📤', component: ImportPage },
  simulation:     { label: 'Simulação',           emoji: '🧮', component: SimulationPage },
  allocations:    { label: 'Rateio',              emoji: '⚡', component: AllocationsPage },
  reconciliation: { label: 'Conferência',         emoji: '🔎', component: ReconciliationPage },
  reports:        { label: 'Relatórios',          emoji: '📈', component: ReportsPage },
  lines:          { label: 'Linhas',              emoji: '📱', component: LinesPage },
  costcenters:    { label: 'Centros de Custo',    emoji: '🏢', component: CostCentersPage },
  rules:          { label: 'Regras de Rateio',    emoji: '⚙',  component: RulesPage },
  users:          { label: 'Usuários',            emoji: '👥', component: UsersPage },
  audit:          { label: 'Auditoria',           emoji: '🔍', component: AuditPage },
};

const NAV_SECTIONS = [
  { label: 'Principal',     items: ['dashboard', 'import'] },
  { label: 'Rateio',        items: ['simulation', 'allocations', 'reconciliation'] },
  { label: 'Análise',       items: ['reports', 'lines'] },
  { label: 'Configuração',  items: ['costcenters', 'rules', 'users'] },
  { label: 'Controle',      items: ['audit'] },
];

function App() {
  const { user, logout, loading } = useAuth();
  const [page, setPage] = useState('dashboard');

  if (loading) return React.createElement('div', {
    style: { display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh' }
  }, React.createElement(Spinner));

  if (!user) return React.createElement(LoginPage);

  const CurrentPage = PAGES[page]?.component || DashboardPage;

  return React.createElement('div', { className: 'app' },
    // Sidebar
    React.createElement('nav', { className: 'sidebar' },
      React.createElement('div', { className: 'sidebar-logo' },
        React.createElement('h1', null, 'Vivo Rateio'),
        React.createElement('span', null, 'Contas Corporativas'),
        React.createElement('div', { className: 'vivo-badge' }, 'VIVO')
      ),
      React.createElement('div', { className: 'sidebar-nav' },
        NAV_SECTIONS.map(section =>
          React.createElement('div', { key: section.label },
            React.createElement('div', { className: 'nav-section' }, section.label),
            section.items.map(key => {
              const item = PAGES[key];
              return React.createElement('div', {
                key,
                className: `nav-item ${page === key ? 'active' : ''}`,
                onClick: () => setPage(key),
              }, item.emoji, ' ', item.label);
            })
          )
        )
      ),
      React.createElement('div', { className: 'sidebar-footer' },
        React.createElement('div', { className: 'user-pill' },
          React.createElement('div', { className: 'user-avatar' }, user.name[0].toUpperCase()),
          React.createElement('div', { className: 'user-info' },
            React.createElement('div', null, user.name.split(' ')[0]),
            React.createElement('small', null, user.role)
          ),
          React.createElement('button', { className: 'logout-btn', onClick: logout, title: 'Sair' }, '⏻')
        )
      )
    ),

    // Main
    React.createElement('main', { className: 'main' },
      React.createElement('div', { className: 'topbar' },
        React.createElement('h2', null, `${PAGES[page]?.emoji} ${PAGES[page]?.label}`),
        React.createElement('div', { className: 'topbar-actions' },
          React.createElement('span', { className: 'text-muted', style: { fontSize: 12 } },
            `Olá, ${user.name.split(' ')[0]}`
          )
        )
      ),
      React.createElement(CurrentPage)
    )
  );
}

// Bootstrap
ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(AuthProvider, null, React.createElement(App))
);
</script>
</body>
</html>
